<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StayHaven — Hero Replica</title>

  <!-- Fonts to match the real app (Playfair Display + Outfit) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ── Design tokens (mirrors globals.css) ──────────────── */
    :root {
      --color-background: #FFFFFF;
      --color-foreground: #111111;
      --color-foreground-secondary: #555555;
      --color-foreground-tertiary: #999999;
      --color-foreground-inverse: #FFFFFF;
      --color-foreground-disabled: #CCCCCC;
      --color-border: #E8E8E8;
      --color-border-strong: #CCCCCC;
      --color-success: #2A7A45;
      --font-heading: 'Playfair Display', serif;
      --font-body: 'Outfit', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: var(--font-body);
      color: var(--color-foreground);
      background: var(--color-background);
      -webkit-font-smoothing: antialiased;
    }

    .font-heading { font-family: var(--font-heading); }

    /* ── Hero wrapper ─────────────────────────────────────── */
    .hero-wrapper {
      padding: 0 16px 48px;  /* pb-12 matches Next version */
    }

    @media (min-width: 550px) {
      .hero-wrapper { padding: 0 24px 48px; }
    }

    .hero {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      min-height: 85vh;
      display: flex;
      align-items: center;
    }

    /* Background image with Ken Burns */
    .hero-bg { position: absolute; inset: 0; overflow: hidden; }
    .hero-bg-inner {
      position: absolute;
      inset: 0;
      animation: heroKenBurns 12s ease-out forwards;
    }
    .hero-bg-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(17, 17, 17, 0.60) 0%,
        rgba(17, 17, 17, 0.40) 50%,
        rgba(17, 17, 17, 0.70) 100%
      );
      opacity: 0;
      animation: heroFadeIn 0.9s ease-out forwards;
    }

    /* ── Keyframes (ported verbatim from globals.css) ─────── */
    @keyframes heroFadeUp {
      0% { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes heroFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes heroScaleIn {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes heroKenBurns {
      0% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .animate-fade-up  { opacity: 0; animation: heroFadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .animate-fade-in  { opacity: 0; animation: heroFadeIn 0.9s ease-out forwards; }
    .animate-scale-in { opacity: 0; animation: heroScaleIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    .delay-1 { animation-delay: 0.10s; }
    .delay-2 { animation-delay: 0.25s; }
    .delay-3 { animation-delay: 0.40s; }
    .delay-4 { animation-delay: 0.55s; }
    .delay-5 { animation-delay: 0.70s; }
    .delay-6 { animation-delay: 0.85s; }
    .delay-7 { animation-delay: 1.00s; }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── Content column ───────────────────────────────────── */
    .hero-content {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 48px 20px;
    }

    @media (min-width: 550px) { .hero-content { padding: 64px 24px; } }
    @media (min-width: 640px) { .hero-content { padding: 64px 40px; } }
    @media (min-width: 1024px){ .hero-content { padding: 64px 64px; } }

    .hero-inner { max-width: 768px; }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 999px;
      padding: 6px 16px;
      margin-bottom: 24px;
    }
    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--color-success);
      animation: pulseDot 2s ease-in-out infinite;
    }
    .badge-text {
      color: rgba(255, 255, 255, 0.90);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    @media (min-width: 385px) { .badge-text { font-size: 12px; } }
    @media (min-width: 640px) { .badge-text { font-size: 14px; } }

    /* Heading */
    .hero-heading {
      font-family: var(--font-heading);
      font-weight: 700;
      font-style: italic;
      color: #fff;
      font-size: 36px;
      line-height: 1.15;
      margin-bottom: 20px;
    }
    @media (min-width: 640px) { .hero-heading { font-size: 48px; } }
    @media (min-width: 1024px) { .hero-heading { font-size: 60px; } }

    /* Subtext */
    .hero-subtext {
      color: rgba(255, 255, 255, 0.75);
      font-size: 16px;
      line-height: 1.7;
      max-width: 512px;
      margin-bottom: 24px;
    }
    @media (min-width: 550px) { .hero-subtext { margin-bottom: 40px; } }
    @media (min-width: 640px) { .hero-subtext { font-size: 18px; } }

    /* Stats */
    .stats {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    @media (min-width: 450px) { .stats { gap: 24px; } }
    @media (min-width: 640px) { .stats { gap: 32px; } }
    @media (min-width: 550px) { .stats { margin-bottom: 40px; } }

    .stat p:first-child {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
    }
    @media (min-width: 640px) { .stat p:first-child { font-size: 30px; } }

    .stat p:last-child {
      color: rgba(255, 255, 255, 0.60);
      font-size: 12px;
    }
    @media (min-width: 640px) { .stat p:last-child { font-size: 14px; } }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255, 255, 255, 0.20);
    }

    /* ── Search / Booking Bar ─────────────────────────────── */
    .search-bar {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      max-width: 896px;
      overflow: hidden;
    }
    @media (min-width: 640px) { .search-bar { border-radius: 16px; } }

    /* Mobile: compact toggle */
    .search-mobile-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 16px;
      background: transparent;
      border: 0;
      cursor: pointer;
      font-family: var(--font-body);
    }
    @media (min-width: 640px) { .search-mobile-toggle { display: none; } }

    .search-mobile-toggle-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--color-foreground-secondary);
    }
    .search-mobile-toggle-left span {
      font-size: 14px;
      font-weight: 500;
    }

    .chevron {
      transition: transform 0.2s ease;
      color: var(--color-foreground-tertiary);
    }
    .search-mobile-toggle[aria-expanded="true"] .chevron {
      transform: rotate(180deg);
    }

    /* Mobile expandable body */
    .search-mobile-fields {
      display: none;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--color-border);
    }
    @media (max-width: 639px) {
      .search-mobile-toggle[aria-expanded="true"] + .search-mobile-fields {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
    }
    @media (min-width: 640px) { .search-mobile-fields { display: none !important; } }

    /* Desktop grid */
    .search-desktop {
      display: none;
      padding: 24px;
    }
    @media (min-width: 640px) {
      .search-desktop {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
    }
    @media (min-width: 1024px) {
      .search-desktop {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .field-col { display: flex; flex-direction: column; gap: 6px; }
    .field-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 449px) { .field-row-2 { grid-template-columns: 1fr; } }

    .field-label {
      color: var(--color-foreground-tertiary);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-input {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 10px 12px;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    .field-input:focus-within {
      box-shadow: 0 0 0 2px rgba(17, 17, 17, 0.2);
    }

    .field-icon {
      color: var(--color-border-strong);
      flex-shrink: 0;
    }

    .field-input input,
    .field-input select {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--color-foreground);
      appearance: none;
      cursor: pointer;
    }
    .field-input input::placeholder {
      color: var(--color-border-strong);
      font-size: 14px;
    }

    .search-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--color-foreground);
      color: var(--color-foreground-inverse);
      padding: 10px 24px;
      height: 42px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 14px;
      text-decoration: none;
      border: 0;
      cursor: pointer;
      transition: background 0.15s ease;
      font-family: var(--font-body);
    }
    .search-btn:hover { background: rgba(17, 17, 17, 0.90); }

    .search-btn-mobile {
      width: 100%;
      padding: 10px 0;
      margin-top: 4px;
    }

    .search-btn-desktop-wrapper {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
  </style>
</head>

<body>
  <section class="hero-wrapper">
    <div class="hero">
      <!-- Background image with Ken Burns animation -->
      <div class="hero-bg">
        <div class="hero-bg-inner">
          <img src="src/assets/hero-image.jpg" alt="StayHaven luxury hotel" />
        </div>
        <div class="hero-overlay"></div>
      </div>

      <!-- Content -->
      <div class="hero-content">
        <div class="hero-inner">
          <!-- Badge -->
          <div class="badge animate-scale-in delay-1">
            <span class="badge-dot"></span>
            <span class="badge-text">12,000+ guests served across Nigeria</span>
          </div>

          <!-- Heading -->
          <h1 class="hero-heading animate-fade-up delay-2">
            Your perfect stay
            <br />
            is one click away.
          </h1>

          <!-- Subtext -->
          <p class="hero-subtext animate-fade-up delay-3">
            Premium rooms, exceptional service, and unforgettable experiences — all in one place. Discover why StayHaven is Nigeria's most trusted hotel.
          </p>

          <!-- Stats -->
          <div class="stats">
            <div class="stat animate-fade-up delay-4">
              <p>4.9</p>
              <p>Guest Rating</p>
            </div>
            <div class="stat-divider animate-fade-in delay-5"></div>
            <div class="stat animate-fade-up delay-5">
              <p>3</p>
              <p>Room Types</p>
            </div>
            <div class="stat-divider animate-fade-in delay-6"></div>
            <div class="stat animate-fade-up delay-6">
              <p>24/7</p>
              <p>Concierge</p>
            </div>
          </div>
        </div>

        <!-- Search / Booking Bar -->
        <div class="search-bar animate-scale-in delay-7">
          <!-- Mobile: toggle -->
          <button class="search-mobile-toggle" id="mobileToggle" aria-expanded="false" aria-controls="mobileFields">
            <div class="search-mobile-toggle-left">
              <!-- calendar icon -->
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
              <span>When are you staying?</span>
            </div>
            <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <!-- Mobile: expandable -->
          <div class="search-mobile-fields" id="mobileFields">
            <div class="field-row-2">
              <div class="field-col">
                <label class="field-label">Check In</label>
                <div class="field-input">
                  <input type="date" />
                </div>
              </div>
              <div class="field-col">
                <label class="field-label">Check Out</label>
                <div class="field-input">
                  <input type="date" />
                </div>
              </div>
            </div>
            <div class="field-row-2">
              <div class="field-col">
                <label class="field-label">Room Type</label>
                <div class="field-input">
                  <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12v5a2 2 0 002 2h16a2 2 0 002-2v-5"></path>
                    <path d="M2 12V7a2 2 0 012-2h2l2-2h8l2 2h2a2 2 0 012 2v5"></path>
                  </svg>
                  <select>
                    <option>All Types</option>
                    <option>Standard</option>
                    <option>Deluxe</option>
                    <option>Suite</option>
                  </select>
                </div>
              </div>
              <div class="field-col">
                <label class="field-label">Guests</label>
                <div class="field-input">
                  <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                  </svg>
                  <select>
                    <option>1 Guest</option>
                    <option>2 Guests</option>
                    <option>3 Guests</option>
                    <option>4 Guests</option>
                  </select>
                </div>
              </div>
            </div>
            <a href="#" class="search-btn search-btn-mobile">
              Search Rooms
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </a>
          </div>

          <!-- Desktop: always visible grid -->
          <div class="search-desktop">
            <div class="field-col">
              <label class="field-label">Check In</label>
              <div class="field-input">
                <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <input type="date" />
              </div>
            </div>
            <div class="field-col">
              <label class="field-label">Check Out</label>
              <div class="field-input">
                <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <input type="date" />
              </div>
            </div>
            <div class="field-col">
              <label class="field-label">Room Type</label>
              <div class="field-input">
                <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 12v5a2 2 0 002 2h16a2 2 0 002-2v-5"></path>
                  <path d="M2 12V7a2 2 0 012-2h2l2-2h8l2 2h2a2 2 0 012 2v5"></path>
                </svg>
                <select>
                  <option>All Types</option>
                  <option>Standard</option>
                  <option>Deluxe</option>
                  <option>Presidential Suite</option>
                </select>
              </div>
            </div>
            <div class="field-col">
              <label class="field-label">Guests</label>
              <div class="field-input">
                <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <select>
                  <option>1 Guest</option>
                  <option>2 Guests</option>
                  <option>3 Guests</option>
                  <option>4 Guests</option>
                </select>
              </div>
            </div>
            <div class="search-btn-desktop-wrapper">
              <a href="#" class="search-btn">
                Search
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Minimal JS: mobile search-bar toggle (matches React useState behavior)
    (function () {
      var toggle = document.getElementById('mobileToggle');
      if (!toggle) return;
      toggle.addEventListener('click', function () {
        var expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', String(!expanded));
      });
    })();
  </script>
</body>
</html>
